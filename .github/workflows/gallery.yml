name: Gallery

# CI is the single canonical renderer for the README gallery. SF Symbol glyphs
# differ across macOS versions, so a byte-for-byte "fail if stale" gate that
# compared a contributor's local render against the runner would false-positive.
# Instead, whenever the rendering code changes, the runner regenerates the
# gallery and commits it back — so assets/ always match one canonical renderer.
#
# Rendering is shared: this runs the same `nix run .#render-gallery` flake app a
# dev runs locally (and that `checks.gallery` validates), not a bespoke command.
#
# No loop: this only triggers on the rendering paths below, and the commit it
# makes touches assets/ (not in `paths`), so the pushed commit doesn't re-trigger.

on:
  push:
    branches: [main]
    paths:
      - "*.swift"
      - "scripts/render-gallery.sh"
      - "modules/flake/packages.nix"
      - ".github/workflows/gallery.yml"

permissions:
  contents: write

jobs:
  gallery:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - name: Render gallery
        # Shared logic: the flake app bundles its runtime deps (sketchybar-icons,
        # ImageMagick, oxipng) and writes the optimised montages to ./assets.
        run: nix run .#render-gallery
      - name: Commit if changed
        run: |
          if git diff --quiet -- assets; then
            echo "Gallery unchanged."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets
          git commit -m "docs: regenerate gallery [skip ci]"
          git push
